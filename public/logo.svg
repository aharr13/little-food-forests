<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Little Food Forests">
  <!-- roundel -->
  <circle cx="50" cy="50" r="47" fill="#f6f1e7"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#2f6a3f" stroke-width="5"/>
  <circle cx="50" cy="50" r="40.5" fill="none" stroke="#caa64a" stroke-width="1.5" stroke-dasharray="2 3"/>

  <!-- sun (top-left) -->
  <g stroke="#d99a2b" stroke-width="2" stroke-linecap="round">
    <line x1="26" y1="20" x2="26" y2="14"/>
    <line x1="18.6" y1="23" x2="14.4" y2="18.8"/>
    <line x1="15.5" y1="30.5" x2="9.5" y2="30.5"/>
  </g>
  <circle cx="26" cy="30.5" r="6" fill="#e7b13e"/>

  <!-- crescent moon (top-right) -->
  <path d="M78 22 a9 9 0 1 0 4 14 a7 7 0 1 1 -4 -14 z" fill="#7fa89c"/>

  <!-- canopy: layered leaf clusters -->
  <circle cx="50" cy="40" r="15" fill="#3f8049"/>
  <circle cx="37" cy="46" r="10" fill="#4f9156"/>
  <circle cx="63" cy="46" r="10" fill="#357540"/>
  <circle cx="50" cy="33" r="10" fill="#54a05d"/>

  <!-- fruit -->
  <circle cx="44" cy="42" r="2.4" fill="#c0492b"/>
  <circle cx="57" cy="39" r="2.4" fill="#c0492b"/>
  <circle cx="50" cy="48" r="2.4" fill="#caa64a"/>
  <circle cx="38" cy="47" r="2.2" fill="#6b6fb0"/>
  <circle cx="62" cy="49" r="2.2" fill="#6b6fb0"/>

  <!-- trunk -->
  <path d="M50 52 v16" stroke="#7a4a26" stroke-width="5" stroke-linecap="round"/>
  <path d="M50 60 l-6 -5 M50 64 l6 -5" stroke="#7a4a26" stroke-width="3" stroke-linecap="round"/>

  <!-- cupped hand / ground -->
  <path d="M22 70 q28 22 56 0" fill="none" stroke="#a9722f" stroke-width="6" stroke-linecap="round"/>
  <path d="M30 75 q20 13 40 0" fill="none" stroke="#caa64a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
